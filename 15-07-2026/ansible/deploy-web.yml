---
- name: Deploy Web Application
  hosts: all
  become: yes

  tasks:
    - name: Install Apache
      dnf:
        name: httpd
        state: present

    - name: Start Apache
      service:
        name: httpd
        state: started
        enabled: yes

    - name: Create index page
      copy:
        dest: /var/www/html/index.html
        content: |
          <h1>Welcome to Pathnex Day 15</h1>
