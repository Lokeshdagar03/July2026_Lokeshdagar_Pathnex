apiVersion: apps/v1
kind: Deployment

metadata:
  name: pathnex-nginx

spec:
  replicas: 2

  selector:
    matchLabels:
      app: pathnex-nginx

  template:
    metadata:
      labels:
        app: pathnex-nginx

    spec:
      containers:
      - name: nginx
        image: nginx

        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf

      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
