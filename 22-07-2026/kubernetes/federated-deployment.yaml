apiVersion: federation.k8s.io/v1beta1
kind: FederatedDeployment

metadata:
  name: pathnex-federated-deployment
  namespace: default

spec:
  template:
    spec:
      replicas: 3

      selector:
        matchLabels:
          app: pathnex-app

      template:
        metadata:
          labels:
            app: pathnex-app

        spec:
          containers:
          - name: nginx
            image: nginx
            ports:
            - containerPort: 80
