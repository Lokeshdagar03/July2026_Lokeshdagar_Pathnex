apiVersion: apps/v1
kind: Deployment
metadata:
  name: pathnex-deployment

spec:
  replicas: 3

  selector:
    matchLabels:
      app: pathnex-app

  template:
    metadata:
      labels:
        app: pathnex-app

    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80
